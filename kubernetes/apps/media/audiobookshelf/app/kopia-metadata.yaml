---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: audiobookshelf-metadata
spec:
  repository:
    kind: ClusterRepository
    name: kopia-repo
  sources:
    - pvc:
        name: audiobookshelf-metadata # the PVC to snapshot
  # GFS retention is the ONLY thing that prunes successful backups.
  retention:
    keepDaily: 7 # "restore any day from the last week"
    keepWeekly: 2 # "...any week from the last month"
  copyMethod: Snapshot
  credentialProjection:
    enabled: true
  verification:
    deep:
      schedule:
        cron: H 5 * * 0
        jitter: 1h
        timezone: ${TIMEZONE}
    quick:
      cron: H 5 * * *
      jitter: 1h
      timezone: ${TIMEZONE}
  volumeSnapshotClassName: zfs-snap
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: audiobookshelf-metadata
spec:
  source:
    fromPolicy:
      name: audiobookshelf-metadata
      offset: 0
  target:
    # A fresh PVC, so the verification never touches the original volume. The
    # operator creates it; capacity is REQUIRED — it won't guess a size.
    populator: {}
  credentialProjection:
    enabled: true
  policy:
    onMissingSnapshot: Continue

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: audiobookshelf-metadata
spec:
  policyRef:
    name: audiobookshelf-metadata # the recipe to invoke each firing
  schedule:
    # `H` = a deterministic per-schedule minute (hashed from the schedule's UID),
    # so many schedules saying "nightly at 2" don't all fire at 02:00 sharp.
    cron: "H 2 * * *"
    # On top of H, spread each firing over a window.
    jitter: 30m
    # GitOps-friendly: applying this manifest does NOT take an immediate backup.
    runOnCreate: false
    timezone: ${TIMEZONE}
