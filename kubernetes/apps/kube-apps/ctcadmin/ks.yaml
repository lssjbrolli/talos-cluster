apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ctcadmin
  namespace: flux-system
spec:
  components:
    - "../../../../components/local"
  interval: 30m
  path: ./kubernetes/apps/kube-apps/ctcadmin/app
  prune: true
  wait: true
  dependsOn:
    - name: cluster17
      namespace: db
  postBuild:
    substituteFrom:
      - name: cluster-config
        kind: ConfigMap
    substitute:
      APP: *app
      NS: kube-apps
      VOLUME: ctcadmin
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
