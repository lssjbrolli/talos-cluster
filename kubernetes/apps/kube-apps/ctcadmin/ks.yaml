---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ctcadmin
spec:
  components:
    - '../../../../components/local'
  interval: 30m
  path: ./kubernetes/apps/kube-apps/ctcadmin/app
  prune: true
  wait: true
  dependsOn:
    - name: cluster17
      namespace: db
  postBuild:
    substituteFrom:
      - name: cluster-settings
        kind: ConfigMap
    substitute:
      APP: *app
      VOLUME: ctcadmin
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
