---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bernd-schorgers/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ownfoil
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: ownfoil
  values:
    # defaultPodOptions:
    #   securityContext:
    #     fsGroup: 568
    #     fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: a1ex4/ownfoil
              tag: 2.2.1@sha256:33b08558252fa4102f132651db11cae9b6646f5df4d97a7ea3261fa4c209bf88
            securityContext:
            #   runAsNonRoot: false
            #   runAsUser: 568
            #   runAsGroup: 568
            #   allowPrivilegeEscalation: true
            #   readOnlyRootFilesystem: false
              capabilities:
                add:
                 - SYS_ADMIN
            resources:
              requests:
                cpu: 150m
                memory: 256Mi
              limits:
                memory: 1024Mi

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: &port 8465
        # externalTrafficPolicy: Local
    route:
      app:
        hostnames: ["eshop.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: http
        rules:
          - backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi

      storage:
        type: persistentVolumeClaim
        existingClaim: ownfoil-data
