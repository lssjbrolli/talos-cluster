---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cloudnative-pg/charts/refs/heads/main/charts/cluster/values.schema.json
type: postgresql
version:
  postgresql: "18"
mode: recovery
cluster:
  instances: 2
  initdb:
    dataChecksums: true
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie@sha256:233d7414ff5c1e4951e85389fb4bec31c18f35be1d7d47eea5aa296a46af0b5f
  logLevel: warning
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 2Gi
  storage:
    size: 10Gi
    storageClass: zfs-apps
  walStorage:
    enabled: true
    size: 2Gi
    storageClass: zfs-apps
  superuserSecret: cnpg-secret
  monitoring:
    enabled: true
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
backups:
  enabled: true
  retentionPolicy: 7d
  provider: s3
  endpointURL: http://rustfs.storage-system.svc.cluster.local:9000
  secret:
    create: false
    name: cnpg-secret
  data:
    compression: bzip2
    encryption: ""
  wal:
    compression: bzip2
    maxParallel: 8
    encryption: ""
  s3:
    region: "eu-east"
    bucket: "cnpg"
    path: "/v2"
    accessKey: aws-access-key-id
    secretKey: aws-secret-access-key
  scheduledBackups:
    - name: cnpg-backup
      schedule: "0 0 */6 * * *"
      backupOwnerReference: self
recovery:
  clusterName: cluster17
  endpointURL: http://rustfs.storage-system.svc.cluster.local:9000
  method: object_store
  provider: s3
  s3:
    region: "eu-east"
    bucket: "cnpg"
    path: "/v1"
    accessKey: aws-access-key-id
    secretKey: aws-secret-access-key
  secret:
    create: false
    name: cnpg-secret
