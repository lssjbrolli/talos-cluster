apiVersion: v1
kind: PersistentVolume
metadata:
  name: ${APP}-pv # some unique name
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 24Ti # size of the volume
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: ${APP}-data # name of pvc which can claim this PV
    namespace: kube-apps # namespace for the pvc
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - talos-cluster # change the hostname where volume is present
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local
  volumeMode: Filesystem