---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app minio
spec:
  components:
    - '../../../../components/local'
  interval: 30m
  path: ./kubernetes/apps/kube-system/minio/app
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      NS: kube-system
      VOLSYNC_SCHED: "0 */3 * * *"
      VOLUME: minio
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
