---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  chartRef:
    kind: OCIRepository
    name: echo
  interval: 1h
  values:
    replicaCount: 1
    config:
      kubernetes: true
      trustedProxies:
        - 172.16.0.0/16
    httpRoute:
      enabled: true
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
      parentRefs:
        - name: internal
          namespace: network
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
