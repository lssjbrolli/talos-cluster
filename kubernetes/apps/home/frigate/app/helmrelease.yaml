---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: frigate
  values:
    image:
      repository: ghcr.io/blakeblackshear/frigate
      tag: 0.17.1
    config: |
      mqtt:
        host: nanomq.db.svc.cluster.local
        user: admin
        password: '{FRIGATE_MQTT_PASSWORD}'
      cameras:
        # Define at least one camera
        living:
          ffmpeg:
            inputs:
              - path: rtsp://living:segasega@192.168.1.161:554/stream2
                roles:
                  - detect
              - path: rtsp://living:segasega@192.168.1.161:554/stream1
                roles:
                  - record
          onvif:
            host: 192.168.1.161
            port: 2020
            # doesn't support yet env for onvif, maybe 0.18 will support
            user: living
            password: segasega
      go2rtc:
        streams:
          main:
            - tapo://1F98DE147357B9C24357B9CA2BA2D726@192.168.1.161?subtype=0
          secondary:
            - tapo://1F98DE147357B9C24357B9CA2BA2D726@192.168.1.161?subtype=1
      live:
        streams:
          Main Stream: main
          Sub Stream: secondary
      record:
        enabled: True
        detections:
          retain:
            days: 2
            mode: motion
      detect:
        # Optional: enables detection for the camera (default: shown below)
        enabled: True
      
    env:
      TZ: ${TIMEZONE}
    envFromSecrets:
      - frigate-secrets
    persistence:
      config:
        # -- Enables persistence for the config directory
        enabled: true
        existingClaim: frigate-config
        ephemeralWritableConfigYaml: true
      media:
        # -- Enables persistence for the media directory
        enabled: true
        accessMode: ReadWriteOnce
        size: 10Gi
    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.1.170