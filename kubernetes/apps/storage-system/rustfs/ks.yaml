apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rustfs
  namespace: flux-system
spec:
  components:
    - "../../../../components/local"
  interval: 30m
  path: ./kubernetes/apps/storage-system/rustfs/app
  prune: true
  wait: true
  dependsOn:
    - name: openebs
      namespace: storage-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-config
        kind: ConfigMap
    substitute:
      APP: *app
      NS: storage-system
      KOPIUR_SCHED: "H */3 * * *"
      VOLUME: minio
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: storage-system
