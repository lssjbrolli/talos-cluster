[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true } # required:template
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
"pipx:flux-local" = "8.3.0"
"aqua:cilium/cilium-cli" = "0.19.4"
"aqua:cli/cli" = "2.95.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:go-task/task" = "3.51.1"
"aqua:siderolabs/talos" = "1.13.4"
"aqua:restic/restic" = "0.19.0"
"aqua:kubernetes-sigs/krew" = "0.5.0"
python = "3.14.5"          # required:template
uv = "0.11.14"             # required:template
pipx = "1.12.0"            # required:template
"pipx:makejinja" = "2.8.2" # required:template
age = "1.3.1"
cloudflared = "2026.5.0"
cue = "0.16.1"             # required:template
flux2 = "2.8.7"
gh = "2.92.0"
gum = "0.17.0"
helm = "4.2.0"
helmfile = "1.5.1"
jq = "1.8.1"
just = "1.51.0"
kubeconform = "0.7.0"
kubectl = "1.36.1"
kustomize = "5.7.1"
sd = "1.1.0"               # required:template
sops = "3.13.1"
talhelper = "3.1.10"
talosctl = "1.13.2"
yq = "4.53.2"

[hooks]
postinstall = "lefthook install"
