---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bernd-schorgers/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: seerr
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: seerr-secrets
        containers:
          main:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: sha-061121c@sha256:f464ff7e52f877475e1097c5b788947d4e9a2c9007d40323c18f1787d4b9b793
            securityContext:
              runAsNonRoot: true
              privileged: false
              runAsUser: 568
              runAsGroup: 568
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: DB_TYPE
                value: postgres
              - name: DB_HOST
                secretKeyRef:
                  name: seerr-secrets
                  key: INIT_POSTGRES_HOST
              - name: DB_USER
                secretKeyRef:
                  name: seerr-secrets
                  key: INIT_POSTGRES_USER
              - name: DB_PASS
                secretKeyRef:
                  name: seerr-secrets
                  key: INIT_POSTGRES_PASS
            probes:
              # -- Configure liveness probe
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/settings/public
                    port: http
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 3
                  # successThreshold: 1
                  # failureThreshold: 3
              # -- Configure readiness probe
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/settings/public
                    port: http
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 3
                  # successThreshold: 1
                  # failureThreshold: 3
              # -- Configure startup probe
              startup: null
              #  tcpSocket:
              #    port: http
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: &port 80
        # externalTrafficPolicy: Local

    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: seerr-config
        globalMounts:
        - path: /app/config
          readOnly: false