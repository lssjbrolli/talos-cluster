apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/apps/db/dragonfly/app
  prune: false # never should be deleted
  dependsOn:
    - name: openebs
      namespace: storage-system
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: db
