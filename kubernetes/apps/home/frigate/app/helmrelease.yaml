---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: frigate
  values:
    config: |
      mqtt:
        enabled: true
        host: nanomq.db.svc.cluster.local
        user: admin
        password: '{FRIGATE_MQTT_PASSWORD}'
      cameras:
        # Define at least one camera
        living:
          ffmpeg:
            inputs:
              - path: rtsp://living:segasega@192.168.1.161:554/stream2
                roles:
                  - detect
              - path: rtsp://living:segasega@192.168.1.161:554/stream1
                roles:
                  - record
          onvif:
            host: 192.168.1.161
            port: 8000
            user: living
            password: segasega
      detectors:
        # coral:
        #   type: edgetpu
        #   device: usb
        cpu1:
          type: cpu
    env:
      TZ: ${TIMEZONE}
    envFromSecrets:
      - frigate-secrets
    persistence:
      config:
        # -- Enables persistence for the config directory
        enabled: true
        existingClaim: frigate-config
        ephemeralWritableConfigYaml: true
      media:
        # -- Enables persistence for the media directory
        enabled: true
        accessMode: ReadWriteOnce
        size: 10Gi
    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.1.170