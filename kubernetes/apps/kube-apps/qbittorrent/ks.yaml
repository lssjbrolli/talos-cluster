apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app qbittorrent
  namespace: flux-system
spec:
  components:
    - "../../../../components/local"
    - "../../../../components/kopiur"
  interval: 30m
  path: ./kubernetes/apps/kube-apps/qbittorrent/app
  prune: true
  wait: true
  dependsOn:
    - name: kopiur-repository
      namespace: storage-system
    - name: generic-device-plugin
      namespace: kube-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-config
        kind: ConfigMap
    substitute:
      APP: *app
      NS: kube-apps
      KOPIUR_CAPACITY: 500Mi
      RETAIN_D: "2"
      VOLUME: media
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
