apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kopiur
spec:
  hostnames:
    - kopiur.${SECRET_DOMAIN}
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: kopia-repo-kopia-ui
          namespace: storage-system
          port: 80
