---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: abs-metadata
spec:
  repository:
    name: primary # kind defaults to Repository (same namespace)
  sources:
    - pvc:
        name: audiobookshelf-metadata # the PVC to snapshot
  # GFS retention is the ONLY thing that prunes successful backups.
  retention:
    keepDaily: 7 # "restore any day from the last week"
    keepWeekly: 2 # "...any week from the last month"

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: abs-metadata
spec:
  source:
    # Object-store backends name an explicit snapshot: paste the Snapshot CR
    # name from `kubectl kopiur snapshots list` (or the manual Snapshot above).
    snapshotRef:
      name: REPLACE_ME
  target:
    # A fresh PVC, so the verification never touches the original volume. The
    # operator creates it; capacity is REQUIRED — it won't guess a size.
    pvc:
      name: abs-metadata-restored
      capacity: 2Gi
      accessModes:
        - ReadWriteOnce

---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: abs-metadata
spec:
  policyRef:
    name: abs-metadata # the recipe to invoke each firing
  schedule:
    # `H` = a deterministic per-schedule minute (hashed from the schedule's UID),
    # so many schedules saying "nightly at 2" don't all fire at 02:00 sharp.
    cron: "H 2 * * *"
    # On top of H, spread each firing over a window.
    jitter: 30m
    # GitOps-friendly: applying this manifest does NOT take an immediate backup.
    runOnCreate: false

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: audiobookshelf-metadata-backup
spec:
  # The PVC to be backed up
  sourcePVC: audiobookshelf-metadata
  trigger:
    # Take a backup every 6 hours
    schedule: "0 */6 * * *"
  restic:
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
    pruneIntervalDays: 7
    # Name of the Secret with the connection information
    repository: restic-audiobookshelf-metadata
    # Retention policy for backups
    retain:
      daily: 1
      weekly: 1
    # Clone the source volume prior to taking a backup to ensure a
    # point-in-time image.
    copyMethod: Snapshot
    # The VSC to use if the copy method is Snapshot (default if omitted)
    volumeSnapshotClassName: zfs-snap

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: audiobookshelf-metadata-restore
spec:
  trigger:
    manual: init
  restic:
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
    repository: restic-audiobookshelf-metadata
    cleanupCachePVC: true
    enableFileDeletion: true
    copyMethod: Snapshot
    accessModes: [ReadWriteOnce]
    capacity: 2Gi
    volumeSnapshotClassName: zfs-snap
