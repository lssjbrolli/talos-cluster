---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: seerr
  values:
    podSecurityContext:
      fsGroup: 568
    securityContext:
      runAsUser: 568
      runAsGroup: 568
    extraEnv:
      - name: TZ
        value: ${TIMEZONE}
    podAnnotations:
      reloader.stakater.com/auto: "true"
    config:
      existingClaim: seerr-config
    route:
      main:
        # -- Enables or disables the Gateway API route
        enabled: true
        annotations: {}
        labels: {}
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        hostnames: ["requests.${SECRET_DOMAIN}"]
        filters: []
        matches:
          - path:
              type: PathPrefix
              value: /
        additionalRules: []
          # - backendRefs:
          #     - identifier: main
          #       port: 80
        # -- To redirect to HTTPS, create a new route object under the main route and enable this option.
        # This should only be used with HTTP-like routes, such as HTTPRoute or GRPCRoute.
        # [Reference]( https://gateway-api.sigs.k8s.io/guides/http-redirect-rewrite/ )
        httpsRedirect: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 768Mi