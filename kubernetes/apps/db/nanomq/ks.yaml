apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nanomq
  namespace: flux-system
spec:
  components:
    - "../../../../components/kopiur"
  interval: 30m
  path: ./kubernetes/apps/db/nanomq/app
  prune: false # never should be deleted
  dependsOn:
    - name: kopiur-repository
      namespace: storage-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-config
        kind: ConfigMap
    substitute:
      APP: *app
      NS: db
      KOPIUR_CAPACITY: 100Mi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: db
