---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app filebrowser
  namespace: flux-system
spec:
  components:
    - "../../../../components/kopiur"
    - "../../../../components/local"
  interval: 30m
  path: ./kubernetes/apps/kube-apps/filebrowser/app
  prune: true
  wait: true
  dependsOn:
    - name: kopiur
      namespace: kube-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-settings
        kind: ConfigMap
    substitute:
      APP: *app
      NS: kube-apps
      KOPIUR_CAPACITY: 200Mi
      VOLSYNC_SCHED: "0 0 * * 6"
      VOLUME: media
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
