---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bernd-schorgers/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 60m
  chartRef:
    kind: OCIRepository
    name: qbittorent
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          qbt:
            # dependsOn: gluetun
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 2Gi
            env:
              TZ: ${TIMEZONE}
            args:
              - --webui-port=80
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
          gluetun:
            # dependsOn: pia-wg-refresh
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            lifecycle:
              postStart:
                exec:
                  command:
                    [
                      "/bin/sh",
                      "-c",
                      "(ip rule del table 51820; ip -6 rule del table 51820) || true",
                    ]
            env:
              #required
              - name: VPN_SERVICE_PROVIDER
                value: custom
              - name: VPN_TYPE
                value: wireguard
              - name: WIREGUARD_MTU
                value: 1384
              - name: SERVER_NAMES
                secretKeyRef:
                  name: vpnconfig
                  key: server
              #optional
              - name: HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE
                value: '{"auth":"none"}'
              - name: VPN_PORT_FORWARDING
                value: on
              - name: VPN_PORT_FORWARDING_PROVIDER
                value: private internet access
              - name: VPN_PORT_FORWARDING_USERNAME
                secretKeyRef:
                  name: vpnconfig
                  key: username
              - name: VPN_PORT_FORWARDING_PASSWORD
                secretKeyRef:
                  name: vpnconfig
                  key: password
              - name: UPDATER_PERIOD
                value: 24h
              - name: TZ
                value: ${TIMEZONE}
              - name: VERSION_INFORMATION
                value: off
              # Allow access to k8s subnets
              - name: FIREWALL_OUTBOUND_SUBNETS
                value: "172.16.0.0/16,172.17.0.0/16,192.168.1.0/24"
              - name: FIREWALL_INPUT_PORTS
                value: 53,80,443,8000,5010
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                cpu: 250m
                memory: 128Mi
              limits:
                memory: 256Mi
                squat.ai/tun: "1"
          port-forward:
            dependsOn: gluetun
            image:
              repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
              tag: 1.3@sha256:679b7a92c494f93b78ad37ef24f3a261e73d0a1a52505ad4f1e39580eedfa14f
            env:
              - name: QBITTORRENT_SERVER
                value: localhost
              - name: QBITTORRENT_PORT
                value: &port 80
              - name: QBITTORRENT_USER
                secretKeyRef:
                  name: qbt-secret
                  key: username
              - name: QBITTORRENT_PASS
                secretKeyRef:
                  name: qbt-secret
                  key: password
              - name: HTTP_S
                value: http
              - name: PORT_FORWARDED
                value: "/tmp/gluetun/forwarded_port"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
          mousehole:
            dependsOn: gluetun
            image:
              repository: tmmrtn/mousehole
              tag: 0.5.0@sha256:2fc02b12362581e60bfd6adba788bda9eda93f8f31ed089581eeabcee4518b0d
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            env:
              - name: TZ
                value: ${TIMEZONE}
              - name: MOUSEHOLE_AUTH_PASSWORD
                secretKeyRef:
                  name: qbt-secret
                  key: mousehole-password
              - name: MOUSEHOLE_ALLOWED_HOSTS
                value: "mh.${SECRET_DOMAIN},localhost,192.168.1.0/24,172.16.0.0/16,172.17.0.0/16"
              - name: MOUSEHOLE_ALLOWED_ORIGINS
                value: "https://mh.${SECRET_DOMAIN},http://localhost:5010"
    service:
      qbt:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: *port
      gluetun:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8000
      mousehole:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 5010
    route:
      qbt:
        hostnames: ["qbt.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: qbt
                port: *port
      mousehole:
        hostnames: ["mh.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: mousehole
                port: 5010
    persistence:
      # Configure mounts for qbt
      config:
        type: persistentVolumeClaim
        existingClaim: qbittorrent-config
        advancedMounts:
          main:
            qbt:
              - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: qbittorrent-data
        advancedMounts:
          main:
            qbt:
              - path: /media
      cache:
        type: persistentVolumeClaim
        size: 100Mi
        accessMode: ReadWriteOnce
        advancedMounts:
          main:
            qbt:
              - path: /config/.cache

      # Configure an emptyDir to share the port-forwarding location between containers
      port-data:
        type: emptyDir
        advancedMounts:
          main:
            gluetun:
              - path: /tmp/gluetun
            port-forward:
              - path: /tmp/gluetun
                readOnly: true

      # Configure an emptyDir for wireguard config
      wg-config:
        type: secret
        name: vpnconfig
        items:
          - key: wg
            path: wg0.conf
            mode: 0655
        advancedMounts:
          main:
            gluetun:
              - path: /gluetun/wireguard/
      mousehole:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Mi
        advancedMounts:
          main:
            mousehole:
              - path: /var/lib/mousehole
