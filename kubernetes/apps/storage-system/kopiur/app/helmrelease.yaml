apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    installScope: cluster
    controller:
      streamingLists: true
    features:
      credentialProjection:
        enabled: true
      kopiaUi:
        enabled: true
    image:
      controller:
        repository: ghcr.io/home-operations/kopiur-controller
        tag: 0.4.13@sha256:cb5d0fd86db24e9d757c6a0fa966da45581527b770a1a0cf87e01d25ac44afda
      mover:
        repository: ghcr.io/home-operations/kopiur-mover
        tag: 0.4.13@sha256:692de0edb8f8c179d328228596755cffa20c8a7af4b883614576ba41ad1d38fb
      webhook:
        repository: ghcr.io/home-operations/kopiur-webhook
        tag: 0.4.13@sha256:83cc18f3da17b07c959f0774a845c0237dc71ff82ed6fc1eaefcf06d888c2235
    podSecurityContext:
      fsGroup: 568
      runAsGroup: 568
      runAsUser: 568
    webhook:
      serviceMonitor:
        enabled: true
