apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sftpgo
  namespace: flux-system
spec:
  components:
    - "../../../../components/local"
  interval: 30m
  path: ./kubernetes/apps/kube-apps/sftpgo/app
  prune: true
  wait: true
  dependsOn:
    - name: cluster17
      namespace: db
    - name: authelia
      namespace: kube-system
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      NS: kube-apps
      VOLUME: media
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
