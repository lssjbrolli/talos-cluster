apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app seerr
  namespace: flux-system
spec:
  components:
    - "../../../../components/kopiur"
  interval: 30m
  path: ./kubernetes/apps/media/seerr/app
  prune: true
  wait: true
  dependsOn:
    - name: kopiur-repository
      namespace: storage-system
    - name: cluster17
      namespace: db
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-config
        kind: ConfigMap
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 200Mi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
