---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app seerr
  namespace: flux-system
spec:
  components:
    - "../../../../components/kopiur"
  interval: 30m
  path: ./kubernetes/apps/kube-apps/seerr/app
  prune: true
  wait: true
  dependsOn:
    - name: kopiur
      namespace: kube-system
    - name: cluster17
      namespace: db
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-settings
        kind: ConfigMap
    substitute:
      APP: *app
      KOPIUR_CAPACITY: 200Mi
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-apps
