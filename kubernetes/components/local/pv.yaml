apiVersion: v1
kind: PersistentVolume
metadata:
  name: ${APP}-pv # some unique name
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 24Ti # size of the volume
  hostPath:
    path: /var/mnt/${VOLUME} # path on the node where volume is present
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - talos-cluster # change the hostname where volume is present
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem