---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/kopiur/refs/heads/main/deploy/helm/kopiur/values.schema.json
streamingLists: true
features:
  credentialProjection:
    enabled: true
  kopiaUi:
    enabled: true
podSecurityContext:
  fsGroup: 568
  runAsGroup: 568
  runAsUser: 568
rbac:
  browseRole: true
monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    backupStaleAfterSeconds: 172800
    enabled: true
webhook:
  serviceMonitor:
    enabled: true
